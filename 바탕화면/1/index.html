<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Hong's Minesweeper</title></head>
<body style="text-align:center; background:#eee;">
<h1>💣 Hong's 50x50 Minesweeper (Deployed!)</h1>
<div id="board" style="display:grid; grid-template-columns:repeat(50, 15px); gap:1px; margin:0 auto; width:fit-content;"></div>
<script>
const board = document.getElementById('board');
for(let i=0; i<2500; i++) {
const cell = document.createElement('div');
cell.style.width = '15px'; cell.style.height = '15px';
cell.style.background = '#ccc'; cell.style.border = '1px solid #999';
board.appendChild(cell);
}
</script>
</body>
</html>
